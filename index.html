    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        window.lineUserId = "unknown";
        window.lineDisplayName = "Player";

        async function initializeLiff() {
            try {
                await liff.init({ liffId: "2009659044-y6Pw50aL" }); 
                
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    window.lineUserId = profile.userId;
                    window.lineDisplayName = profile.displayName;
                    
                    // 暴力除錯：讓網頁一開啟就彈出你的名字，確認讀心術成功！
                    alert("LIFF 啟動成功！抓到玩家：" + window.lineDisplayName);
                } else {
                    liff.login();
                }
            } catch (err) {
                alert("LIFF 啟動失敗：" + err.message);
                console.error("LIFF 初始化失敗", err);
            }
        }
        initializeLiff();
    </script>
